name: prill_mobile
description: "Справочник лекарственных препаратов с поиском по симптомам."
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/MedGuide.png
  adaptive_icon_background: "#1B8A5A"
  adaptive_icon_foreground: assets/branding/MedGuide.png

flutter:
  uses-material-design: true
  assets:
    - assets/drugs.json
    - assets/images/
    - assets/images/drugs/
