services:
  - type: web
    name: prill-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: SEED_ADMIN_TOKEN
        generateValue: true
      - key: IMAGE_BASE_URL
        sync: false
